name: CI

on:
  push:
    branches: [main, preview-ready]
  pull_request:
    branches: [main, preview-ready]

# Cancel earlier runs on the same ref — only the latest commit's CI matters.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend · py_compile + pytest
    runs-on: ubuntu-latest
    timeout-minutes: 12

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: orgon_test
          POSTGRES_PASSWORD: orgon_test
          POSTGRES_DB: orgon_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U orgon_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://orgon_test:orgon_test@localhost:5432/orgon_test
      # Test mode flags read by various services on startup.
      ORGON_ENV: test
      JWT_SECRET: test_jwt_secret_for_ci_only
      SAFINA_BASE_URL: http://localhost:0  # never reached in tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio python-dotenv

      - name: Compile-check every backend module
        run: |
          python -m compileall -q backend

      - name: Apply migrations against postgres service
        run: |
          # Pre-seed legacy schema (some columns added by older migrations
          # are required by later ones), then apply the multi-tenant /
          # consolidation overlay.
          for f in $(ls backend/database/migrations/0*.sql | sort); do
            echo "→ $f"
            PGPASSWORD=orgon_test psql -h localhost -U orgon_test -d orgon_test -v ON_ERROR_STOP=0 -f "$f" >/dev/null
          done
          # Newer migrations (000_init_uuid_base conflicts with above; skip).
          for f in $(ls backend/migrations/0*.sql | grep -vE "/000_" | sort); do
            echo "→ $f"
            PGPASSWORD=orgon_test psql -h localhost -U orgon_test -d orgon_test -v ON_ERROR_STOP=0 -f "$f" >/dev/null
          done

      - name: Run pytest (unit only, no integration suite)
        run: |
          # Integration tests under tests/test_*_e2e.py / test_*_performance.py
          # talk to live Safina / require fixtures we don't ship to CI yet.
          # Run the focused unit suite.
          python -m pytest \
            backend/tests/test_signature_service.py \
            backend/tests/test_transaction_service_validation.py \
            backend/tests/test_network_service.py \
            backend/tests/test_telegram_notifier.py \
            backend/tests/test_email_service.py \
            backend/tests/test_stripe_service.py \
            backend/tests/test_billing_stripe_webhook.py \
            backend/tests/test_observability.py \
            backend/tests/test_admin_partners.py \
            -v --tb=short

  frontend:
    name: Frontend · tsc + lint + build
    runs-on: ubuntu-latest
    timeout-minutes: 12

    defaults:
      run:
        working-directory: frontend

    env:
      # Build needs at least these to be defined; values don't have to resolve in CI.
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint . --max-warnings=200

      - name: Build
        run: npm run build

  e2e:
    name: E2E · Playwright (chromium)
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/preview-ready'

    defaults:
      run:
        working-directory: frontend

    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Run Playwright
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7
