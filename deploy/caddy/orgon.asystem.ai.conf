orgon.asystem.ai {
  encode gzip zstd

  header {
    Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options    "nosniff"
    X-Frame-Options           "SAMEORIGIN"
    Referrer-Policy           "strict-origin-when-cross-origin"
    -Server
  }

  request_body {
    max_size 25MB
  }

  reverse_proxy 10.0.1.14:3000 {
    transport http {
      read_timeout 60s
      write_timeout 60s
    }
  }

  log {
    output file /var/log/caddy/orgon.asystem.ai.log {
      roll_size 100MiB
      roll_keep 5
    }
    format json
    level INFO
  }
}
