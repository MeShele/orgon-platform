name: CI

on:
  push:
    branches: [main, preview-ready]
  pull_request:
    branches: [main, preview-ready]

# Cancel earlier runs on the same ref — only the latest commit's CI matters.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend · py_compile + pytest
    runs-on: ubuntu-latest
    timeout-minutes: 12

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: orgon_test
          POSTGRES_PASSWORD: orgon_test
          POSTGRES_DB: orgon_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U orgon_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://orgon_test:orgon_test@localhost:5432/orgon_test
      # Test mode flags read by various services on startup.
      ORGON_ENV: test
      JWT_SECRET: test_jwt_secret_for_ci_only
      SAFINA_BASE_URL: http://localhost:0  # never reached in tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio python-dotenv

      - name: Compile-check every backend module
        run: |
          python -m compileall -q backend

      - name: Apply canonical schema + any post-snapshot overlay migrations
        run: |
          # Single canonical file replaces the pre-Wave-11 47-file chain.
          # ON_ERROR_STOP=1 — surface any failure instead of swallowing.
          # _historical/ is the archive of pre-consolidation files; never apply.
          set -e
          PGPASSWORD=orgon_test psql -h localhost -U orgon_test -d orgon_test \
            -v ON_ERROR_STOP=1 \
            -f backend/migrations/000_canonical_schema.sql >/dev/null
          # Future overlay migrations (025+, idempotent) — apply in numeric order.
          for f in $(ls backend/migrations/0*.sql 2>/dev/null | grep -v 000_canonical | sort); do
            echo "→ $f"
            PGPASSWORD=orgon_test psql -h localhost -U orgon_test -d orgon_test \
              -v ON_ERROR_STOP=1 -f "$f" >/dev/null
          done

      - name: Verify canonical marker landed
        run: |
          PGPASSWORD=orgon_test psql -h localhost -U orgon_test -d orgon_test -tAc \
            "SELECT version FROM schema_migrations WHERE version='000_canonical_schema'" \
            | grep -q '000_canonical_schema'

      - name: Run pytest (unit only, no integration suite)
        run: |
          # Integration tests under tests/test_*_e2e.py / test_*_performance.py
          # talk to live Safina / require fixtures we don't ship to CI yet.
          # Run the focused unit suite.
          python -m pytest \
            backend/tests/test_signature_service.py \
            backend/tests/test_transaction_service_validation.py \
            backend/tests/test_network_service.py \
            backend/tests/test_telegram_notifier.py \
            backend/tests/test_email_service.py \
            backend/tests/test_stripe_service.py \
            backend/tests/test_billing_stripe_webhook.py \
            backend/tests/test_observability.py \
            backend/tests/test_admin_partners.py \
            backend/tests/test_signer_backends.py \
            backend/tests/test_signature_verifier.py \
            -v --tb=short

  frontend:
    name: Frontend · tsc + lint + build
    runs-on: ubuntu-latest
    timeout-minutes: 12

    defaults:
      run:
        working-directory: frontend

    env:
      # Build needs at least these to be defined; values don't have to resolve in CI.
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint . --max-warnings=200

      - name: Build
        run: npm run build

  fresh-install:
    name: Fresh-install · canonical schema → uvicorn → /api/health
    runs-on: ubuntu-latest
    timeout-minutes: 8

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: orgon_fresh
          POSTGRES_PASSWORD: orgon_fresh
          POSTGRES_DB: orgon_fresh
        ports: ["5433:5432"]
        options: >-
          --health-cmd "pg_isready -U orgon_fresh"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://orgon_fresh:orgon_fresh@localhost:5433/orgon_fresh
      ORGON_ENV: test
      JWT_SECRET_KEY: fresh_install_jwt_secret
      SAFINA_BASE_URL: http://localhost:0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Apply canonical schema (only) — strict mode
        run: |
          set -e
          PGPASSWORD=orgon_fresh psql -h localhost -p 5433 -U orgon_fresh -d orgon_fresh \
            -v ON_ERROR_STOP=1 \
            -f backend/migrations/000_canonical_schema.sql >/dev/null
          for f in $(ls backend/migrations/0*.sql 2>/dev/null | grep -v 000_canonical | sort); do
            PGPASSWORD=orgon_fresh psql -h localhost -p 5433 -U orgon_fresh -d orgon_fresh \
              -v ON_ERROR_STOP=1 -f "$f" >/dev/null
          done

      - name: Boot uvicorn in background, wait for /api/health
        run: |
          # Run app as a background process bound to localhost:8890.
          python -m uvicorn backend.main:app --host 127.0.0.1 --port 8890 &
          APP_PID=$!
          # Wait up to 30s for the health endpoint to come live.
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8890/api/health >/dev/null 2>&1; then
              echo "✓ /api/health responding after ${i}s"
              kill $APP_PID 2>/dev/null
              exit 0
            fi
            sleep 1
          done
          echo "✗ /api/health did not respond within 30s"
          kill $APP_PID 2>/dev/null
          exit 1

  e2e:
    name: E2E · Playwright (chromium)
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/preview-ready'

    defaults:
      run:
        working-directory: frontend

    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Run Playwright
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7
