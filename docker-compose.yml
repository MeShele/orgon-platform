# ORGON application stack — Docker Compose source for Coolify deployments.
#
# Postgres is NO LONGER in this compose — it lives as a Coolify-managed
# standalone-postgresql (uuid zbezy4vjauvrsp9p78w4ayxl, hostname inside
# the `coolify` network = the same uuid). Backups, version upgrades and
# lifecycle are managed through Coolify UI. This compose now only ships
# the application (backend + frontend).
#
# Coolify magic env vars used here:
#   ${SERVICE_PASSWORD_PG}      pg password — wired to the Coolify DB env
#   ${SERVICE_PASSWORD_64_JWT}  random 64-char JWT secret
#   ${SERVICE_URL_FRONTEND}     full https URL of the frontend service

services:
  backend:
    build:
      context: ./backend
    environment:
      # ─── core wiring ────────────────────────────────────────────────
      # Backend connects to the Coolify-managed Postgres (uuid acts as
      # hostname inside `coolify` external network).
      DATABASE_URL: "postgresql://orgon:${SERVICE_PASSWORD_PG}@zbezy4vjauvrsp9p78w4ayxl:5432/orgon"
      JWT_SECRET_KEY: "${SERVICE_PASSWORD_64_JWT}"
      ORGON_ENV: "production"
      ORGON_PUBLIC_URL: "${SERVICE_URL_FRONTEND}"
      CORS_ORIGINS: "${SERVICE_URL_FRONTEND}"
      # ─── first-boot bootstrap ──────────────────────────────────────
      ORGON_AUTO_MIGRATE: "1"   # apply 000_canonical_schema.sql once
      ORGON_AUTO_SEED:    "1"   # apply seed_test_organizations.sql once
      # ─── Safina (live by default; can fall back to stub via env) ───
      # SAFINA_STUB / SAFINA_BASE_URL / SAFINA_EC_PRIVATE_KEY are set in
      # Coolify env. The :- defaults below keep the compose runnable in
      # plain `docker compose up` without secrets (it'll start in stub
      # mode with no key needed).
      SAFINA_STUB: "${SAFINA_STUB:-1}"
      SAFINA_BASE_URL: "${SAFINA_BASE_URL:-http://localhost:0}"
      SAFINA_EC_PRIVATE_KEY: "${SAFINA_EC_PRIVATE_KEY:-}"
      ORGON_SIGNER_BACKEND: "env"   # env | kms | vault — see signer_backends.py
      # ─── observability ─────────────────────────────────────────────
      ORGON_JSON_LOGS: "1"          # structured logs read better in Coolify
      # SENTRY_DSN — set in Coolify UI when you have a Sentry project.
      # ─── billing (Stripe) ──────────────────────────────────────────
      # Leaving STRIPE_API_KEY unset → /api/v1/billing/checkout returns
      # a clean 503 ("Stripe is not configured"). For real billing set
      # STRIPE_API_KEY + STRIPE_WEBHOOK_SECRET + STRIPE_PRICE_* in UI.
    healthcheck:
      # python is in the slim image; wget/curl are not.
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,sys; sys.exit(0 if b'ok' in urllib.request.urlopen('http://127.0.0.1:8890/api/health').read() else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        # Server-side proxy destination — never reaches the browser.
        BACKEND_INTERNAL_URL: "http://backend:8890"
        # Empty so client bundle uses relative URLs and goes through
        # the Next.js node server's rewrite (defined in next.config.ts).
        NEXT_PUBLIC_API_URL: ""
    environment:
      BACKEND_INTERNAL_URL: "http://backend:8890"
      NEXT_TELEMETRY_DISABLED: "1"
    expose:
      - "3000"
    # Bind container port 3000 to host 127.0.0.1:13000.
    # Host's systemd Caddy reverse-proxies orgon.asystem.ai → here
    # via /etc/caddy/conf.d/orgon.asystem.ai.conf. Loopback-only:
    # never publicly exposed. Same pattern as aku.asystem.ai (8083).
    ports:
      - "127.0.0.1:13000:3000"
    networks:
      - default
      - coolify
    depends_on:
      backend:
        condition: service_healthy

networks:
  coolify:
    external: true

# Volume `orgon-pg-data` is intentionally NOT declared here anymore —
# Postgres is Coolify-managed (uuid zbezy4vjauvrsp9p78w4ayxl) and owns
# its own persistent volume. The legacy in-compose volume from before
# the 2026-05-01 split remains on the host in /var/lib/docker/volumes/
# as a rollback safety net (named volumes are not auto-deleted by
# `docker compose down`). Drop it manually after one week of clean
# operation:  docker volume rm <project>_orgon-pg-data
