# ORGON demo stack — Docker Compose source for Coolify deployments.
#
# Coolify magic env vars (https://coolify.io/docs/services/magic-environment-variables):
#   ${SERVICE_PASSWORD_PG}      random Postgres password, shared between
#                                backend and the pg service
#   ${SERVICE_PASSWORD_64_JWT}  random 64-char JWT secret
#   ${SERVICE_URL_FRONTEND}     full https URL of the frontend service,
#                                derived by Coolify from docker_compose_domains.
#                                We use the un-suffixed form (not the buggy
#                                _3000 suffix variant which lags behind on
#                                the auto-generated sslip.io URL).
#
# Coolify matches the magic env name's service portion ("FRONTEND") to
# a docker-compose service named "frontend". So we keep service names
# short and prefix-free here, even though they correspond to ORGON.

services:
  pg:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orgon
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_PG}
      POSTGRES_DB: orgon
    networks:
      - default
      - coolify
    volumes:
      - orgon-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orgon -d orgon"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── one-shot DB migration ───────────────────────────────────────
  # 2026-05-01 — splitting Postgres out of compose into a Coolify-
  # managed standalone-postgresql (uuid zbezy4vjauvrsp9p78w4ayxl) so
  # we get scheduled backups and independent app/DB lifecycle.
  #
  # This service runs once per deploy, dumps the in-compose `pg` and
  # restores into the Coolify-managed pg, prints sanity counters,
  # then sleeps. After the second deploy (where this whole block +
  # the `pg` service above are removed), backend points at the new
  # DB directly and the old volume `orgon-pg-data` is left as a
  # rollback safety net.
  pg-migrate:
    image: postgres:16-alpine
    restart: "no"
    networks:
      - default
      - coolify
    environment:
      PGPASSWORD: ${SERVICE_PASSWORD_PG}
      OLD_HOST: pg
      NEW_HOST: zbezy4vjauvrsp9p78w4ayxl
    depends_on:
      pg:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        set -e
        echo "[migrate] sleeping 5s for new DB readiness"
        sleep 5
        echo "[migrate] === starting pg_dump (old) | psql (new) ==="
        pg_dump -h "$OLD_HOST" -U orgon -d orgon --no-owner --no-acl --clean --if-exists \
          | psql -h "$NEW_HOST" -U orgon -d orgon -v ON_ERROR_STOP=1 > /tmp/restore.log 2>&1 \
          || { echo "[migrate] FAILED — restore log:"; tail -50 /tmp/restore.log; exit 1; }
        echo "[migrate] === migration done — counters ==="
        echo -n "[migrate] OLD: "
        psql -h "$OLD_HOST" -U orgon -d orgon -tAc \
          "SELECT 'users='||(SELECT count(*) FROM users)||', wallets='||(SELECT count(*) FROM wallets)||', transactions='||(SELECT count(*) FROM transactions)||', audit_logs='||(SELECT count(*) FROM audit_logs);"
        echo -n "[migrate] NEW: "
        psql -h "$NEW_HOST" -U orgon -d orgon -tAc \
          "SELECT 'users='||(SELECT count(*) FROM users)||', wallets='||(SELECT count(*) FROM wallets)||', transactions='||(SELECT count(*) FROM transactions)||', audit_logs='||(SELECT count(*) FROM audit_logs);"
        echo "[migrate] === DONE ==="
        exec tail -f /dev/null

  backend:
    build:
      context: ./backend
    environment:
      # ─── core wiring ────────────────────────────────────────────────
      DATABASE_URL: "postgresql://orgon:${SERVICE_PASSWORD_PG}@pg:5432/orgon"
      JWT_SECRET_KEY: "${SERVICE_PASSWORD_64_JWT}"
      ORGON_ENV: "production"
      ORGON_PUBLIC_URL: "${SERVICE_URL_FRONTEND}"
      CORS_ORIGINS: "${SERVICE_URL_FRONTEND}"
      # ─── first-boot bootstrap ──────────────────────────────────────
      ORGON_AUTO_MIGRATE: "1"   # apply 000_canonical_schema.sql once
      ORGON_AUTO_SEED:    "1"   # apply seed_test_organizations.sql once
      # ─── Safina (live by default; can fall back to stub via env) ───
      # SAFINA_STUB / SAFINA_BASE_URL / SAFINA_EC_PRIVATE_KEY are set in
      # Coolify env. The :- defaults below keep the compose runnable in
      # plain `docker compose up` without secrets (it'll start in stub
      # mode with no key needed).
      SAFINA_STUB: "${SAFINA_STUB:-1}"
      SAFINA_BASE_URL: "${SAFINA_BASE_URL:-http://localhost:0}"
      SAFINA_EC_PRIVATE_KEY: "${SAFINA_EC_PRIVATE_KEY:-}"
      ORGON_SIGNER_BACKEND: "env"   # env | kms | vault — see signer_backends.py
      # ─── observability ─────────────────────────────────────────────
      ORGON_JSON_LOGS: "1"          # structured logs read better in Coolify
      # SENTRY_DSN — set in Coolify UI when you have a Sentry project.
      # ─── billing (Stripe) ──────────────────────────────────────────
      # Leaving STRIPE_API_KEY unset → /api/v1/billing/checkout returns
      # a clean 503 ("Stripe is not configured"). For real billing set
      # STRIPE_API_KEY + STRIPE_WEBHOOK_SECRET + STRIPE_PRICE_* in UI.
    depends_on:
      pg:
        condition: service_healthy
    healthcheck:
      # python is in the slim image; wget/curl are not.
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,sys; sys.exit(0 if b'ok' in urllib.request.urlopen('http://127.0.0.1:8890/api/health').read() else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        # Server-side proxy destination — never reaches the browser.
        BACKEND_INTERNAL_URL: "http://backend:8890"
        # Empty so client bundle uses relative URLs and goes through
        # the Next.js node server's rewrite (defined in next.config.ts).
        NEXT_PUBLIC_API_URL: ""
    environment:
      BACKEND_INTERNAL_URL: "http://backend:8890"
      NEXT_TELEMETRY_DISABLED: "1"
    expose:
      - "3000"
    # Bind container port 3000 to host 127.0.0.1:13000.
    # Host's systemd Caddy reverse-proxies orgon.asystem.ai → here
    # via /etc/caddy/conf.d/orgon.asystem.ai.conf. Loopback-only:
    # never publicly exposed. Same pattern as aku.asystem.ai (8083).
    ports:
      - "127.0.0.1:13000:3000"
    networks:
      - default
      - coolify
    depends_on:
      backend:
        condition: service_healthy

networks:
  coolify:
    external: true

volumes:
  orgon-pg-data:
