# Alertmanager Configuration for ORGON B2B Platform
# Sends alerts to Telegram

global:
  resolve_timeout: 5m

# Templates for alert messages
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Route tree
route:
  group_by: ['alertname', 'cluster', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'telegram'
  
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'telegram'
      group_wait: 0s
      repeat_interval: 1h
    
    # Warning alerts - batched notification
    - match:
        severity: warning
      receiver: 'telegram'
      group_wait: 30s
      repeat_interval: 6h

# Receivers (notification targets)
receivers:
  - name: 'telegram'
    webhook_configs:
      - url: 'http://host.docker.internal:8891/alertmanager-webhook'
        send_resolved: true

# Inhibition rules (suppress alerts)
inhibit_rules:
  # Suppress warning if critical alert is firing
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'component']
