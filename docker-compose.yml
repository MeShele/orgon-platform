version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: orgon-postgres-dev
    restart: unless-stopped
    environment:
      - POSTGRES_USER=orgon_user
      - POSTGRES_PASSWORD=orgon_dev_password
      - POSTGRES_DB=orgon_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - orgon-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orgon_user -d orgon_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: orgon-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SAFINA_API_BASE_URL=https://my.safina.pro/ece
      - SAFINA_API_KEY=${SAFINA_API_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - HOST=0.0.0.0
      - PORT=8890
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - orgon-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8890/api/dashboard/stats')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: orgon-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=https://${PUBLIC_DOMAIN}/api
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - orgon-network
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -q 'next-server' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: orgon-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    volumes:
      - ./cloudflare-tunnel-config.yaml:/etc/cloudflared/config.yaml:ro
      - ./cloudflare-credentials.json:/etc/cloudflared/credentials.json:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - orgon-network
    # Note: Using local config file with correct Docker service names:
    # - Frontend: orgon-frontend:3000
    # - Backend: orgon-backend:8890
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  orgon-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres-data:
    driver: local
